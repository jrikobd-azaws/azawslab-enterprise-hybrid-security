---
# Linux target password is loaded at runtime from Azure Key Vault
# by scripts/run-linux-with-keyvault-secrets.sh.
# Do not place plaintext passwords in inventory files.

ansible_password: "{{ lookup('env', 'LINUX_HQ_ADMIN_PASSWORD') }}"
ansible_become_password: "{{ lookup('env', 'LINUX_HQ_ADMIN_PASSWORD') }}"
