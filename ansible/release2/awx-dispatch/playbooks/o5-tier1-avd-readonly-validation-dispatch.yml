---
- name: O5 - Tier 1 - AVD Read-Only Validation Dispatch
  hosts: vm_dev_mgmt_01
  gather_facts: false

  vars:
    avd_resource_group: rg-dev-avd-northeurope
    avd_host_pool_name: vdpool-dev-northeurope
    avd_session_host_name: vm-dev-avd-01
    avd_expected_assigned_user: awx-admin@entra.azawslab.co.uk

  tasks:
    - name: Login to Azure with vm-dev-mgmt-01 managed identity
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 60 az login --identity --output none
        az account show --query '{user:user.name,tenantId:tenantId,subscriptionId:id,name:name,state:state}' --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 AVD resource group
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 60 az group show \
          --name '{{ avd_resource_group }}' \
          --query '{name:name,location:location,provisioningState:properties.provisioningState,tags:tags}' \
          --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 AVD host pool
      ansible.builtin.shell: |
        set -euo pipefail

        SubId="$(timeout 60 az account show --query id --output tsv)"
        HostPoolUri="https://management.azure.com/subscriptions/${SubId}/resourceGroups/{{ avd_resource_group }}/providers/Microsoft.DesktopVirtualization/hostPools/{{ avd_host_pool_name }}?api-version=2025-10-10"

        timeout 60 az rest \
          --method get \
          --url "$HostPoolUri" \
          --query '{name:name,location:location,hostPoolType:properties.hostPoolType,personalDesktopAssignmentType:properties.personalDesktopAssignmentType,customRdpProperty:properties.customRdpProperty}' \
          --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 AVD session host assignment and health
      ansible.builtin.shell: |
        set -euo pipefail

        SubId="$(timeout 60 az account show --query id --output tsv)"
        SessionHostUri="https://management.azure.com/subscriptions/${SubId}/resourceGroups/{{ avd_resource_group }}/providers/Microsoft.DesktopVirtualization/hostPools/{{ avd_host_pool_name }}/sessionHosts/{{ avd_session_host_name }}?api-version=2025-10-10"

        timeout 60 az rest \
          --method get \
          --url "$SessionHostUri" \
          --query '{name:name,status:properties.status,assignedUser:properties.assignedUser,allowNewSession:properties.allowNewSession,lastHeartBeat:properties.lastHeartBeat}' \
          --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 AVD session host VM state
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 60 az vm show \
          --resource-group '{{ avd_resource_group }}' \
          --name '{{ avd_session_host_name }}' \
          --show-details \
          --query '{name:name,location:location,powerState:powerState,provisioningState:provisioningState,privateIps:privateIps,publicIps:publicIps,identity:identity.type}' \
          --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 AVD session host VM extensions
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 60 az vm extension list \
          --resource-group '{{ avd_resource_group }}' \
          --vm-name '{{ avd_session_host_name }}' \
          --query '[].{name:name,publisher:publisher,type:type,provisioningState:provisioningState,typeHandlerVersion:typeHandlerVersion}' \
          --output table
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate basic in-guest state through Azure VM Run Command
      ansible.builtin.shell: |
        set -euo pipefail

        ScriptFile="$(mktemp)"
        cat > "$ScriptFile" <<'PS1'
        Write-Output '===== Computer identity ====='
        Get-ComputerInfo |
          Select-Object CsName, CsDomain, CsPartOfDomain, WindowsProductName, WindowsVersion, OsBuildNumber |
          Format-List

        Write-Output ''
        Write-Output '===== dsregcmd key fields ====='
        dsregcmd /status |
          Select-String -Pattern 'AzureAdJoined','EnterpriseJoined','DomainJoined','DeviceAuthStatus','TenantName','TenantId','AzureAdPrt','WamDefaultSet'

        Write-Output ''
        Write-Output '===== AVD and RDP services ====='
        Get-Service RDAgentBootLoader, RDAgent, TermService, SessionEnv, UmRdpService -ErrorAction Continue |
          Select-Object Name, Status, StartType |
          Format-Table -AutoSize

        Write-Output ''
        Write-Output '===== Tool command availability - read-only ====='
        $Commands = 'az','kubectl','kubelogin','helm','git','code','terraform','aws','pwsh','python'
        foreach ($Command in $Commands) {
          $Resolved = Get-Command $Command -ErrorAction SilentlyContinue
          if ($Resolved) {
            Write-Output "$Command = $($Resolved.Source)"
          }
          else {
            Write-Output "$Command = NOT FOUND"
          }
        }
        PS1

        timeout 180 az vm run-command invoke \
          --resource-group '{{ avd_resource_group }}' \
          --name '{{ avd_session_host_name }}' \
          --command-id RunPowerShellScript \
          --scripts "$(cat "$ScriptFile")" \
          --query 'value[].message' \
          --output tsv

        rm -f "$ScriptFile"
      args:
        executable: /bin/bash
      changed_when: false
