---
- name: O5 - Tier 1 - AVD Read-Only Validation Dispatch
  hosts: vm_dev_mgmt_01
  gather_facts: false

  vars:
    avd_resource_group: rg-dev-avd-northeurope
    avd_host_pool_name: vdpool-dev-northeurope
    avd_session_host_name: vm-dev-avd-01
    avd_expected_assigned_user: awx-admin@entra.azawslab.co.uk

  tasks:
    - name: Run O5 AVD read-only validation from management host
      ansible.builtin.shell: |
        set -euo pipefail

        export PATH="$HOME/bin:$PATH"

        EvidenceFile="$HOME/o5-avd-readonly-validation.txt"
        AvdRg="{{ avd_resource_group }}"
        HostPoolName="{{ avd_host_pool_name }}"
        SessionHostName="{{ avd_session_host_name }}"
        ExpectedAssignedUser="{{ avd_expected_assigned_user }}"

        az login --identity >/dev/null

        SubId="$(az account show --query id --output tsv)"
        SessionHostUri="https://management.azure.com/subscriptions/${SubId}/resourceGroups/${AvdRg}/providers/Microsoft.DesktopVirtualization/hostPools/${HostPoolName}/sessionHosts/${SessionHostName}?api-version=2025-10-10"

        cat > "$EvidenceFile" <<EOF
        O5 AVD Read-Only Validation
        ===========================

        Purpose:
        Validate O5 AVD control-plane and session-host readiness through the AWX -> vm-dev-mgmt-01 execution model.

        Scope:
        Read-only validation only.

        No secrets, tokens, private keys, tfstate, tfplan, or kubeconfigs are included.
        EOF

        {
          echo ''
          echo '===== Azure account context ====='
          az account show \
            --query '{user:user.name,tenantId:tenantId,subscriptionId:id,name:name,state:state}' \
            --output json

          echo ''
          echo '===== AVD resource group ====='
          az group show \
            --name "$AvdRg" \
            --query '{name:name,location:location,provisioningState:properties.provisioningState,tags:tags}' \
            --output json

          echo ''
          echo '===== AVD host pool ====='
          az desktopvirtualization hostpool show \
            --resource-group "$AvdRg" \
            --name "$HostPoolName" \
            --query '{name:name,location:location,hostPoolType:hostPoolType,personalDesktopAssignmentType:personalDesktopAssignmentType,customRdpProperty:customRdpProperty}' \
            --output json

          echo ''
          echo '===== Session host assignment and health ====='
          az rest \
            --method get \
            --url "$SessionHostUri" \
            --query '{name:name,status:properties.status,assignedUser:properties.assignedUser,allowNewSession:properties.allowNewSession,lastHeartBeat:properties.lastHeartBeat}' \
            --output json

          echo ''
          echo '===== Session host VM state ====='
          az vm show \
            --resource-group "$AvdRg" \
            --name "$SessionHostName" \
            --show-details \
            --query '{name:name,location:location,powerState:powerState,provisioningState:provisioningState,privateIps:privateIps,publicIps:publicIps,identity:identity.type}' \
            --output json

          echo ''
          echo '===== Session host VM extensions ====='
          az vm extension list \
            --resource-group "$AvdRg" \
            --vm-name "$SessionHostName" \
            --query '[].{name:name,publisher:publisher,type:type,provisioningState:provisioningState,typeHandlerVersion:typeHandlerVersion}' \
            --output table

          echo ''
          echo '===== In-guest identity and service checks ====='

          ScriptFile="$(mktemp)"
          cat > "$ScriptFile" <<'PS1'
        Write-Output '===== Computer identity ====='
        Get-ComputerInfo |
          Select-Object CsName, CsDomain, CsPartOfDomain, WindowsProductName, WindowsVersion, OsBuildNumber |
          Format-List

        Write-Output ''
        Write-Output '===== dsregcmd key fields ====='
        dsregcmd /status |
          Select-String -Pattern 'AzureAdJoined','EnterpriseJoined','DomainJoined','DeviceAuthStatus','TenantName','TenantId','AzureAdPrt','WamDefaultSet'

        Write-Output ''
        Write-Output '===== AVD and RDP services ====='
        Get-Service RDAgentBootLoader, RDAgent, TermService, SessionEnv, UmRdpService -ErrorAction Continue |
          Select-Object Name, Status, StartType |
          Format-Table -AutoSize

        Write-Output ''
        Write-Output '===== Installed tool command availability ====='
        $Commands = 'az','kubectl','kubelogin','helm','git','code','terraform','aws','pwsh','python'
        foreach ($Command in $Commands) {
          $Resolved = Get-Command $Command -ErrorAction SilentlyContinue
          if ($Resolved) {
            Write-Output "$Command = $($Resolved.Source)"
          }
          else {
            Write-Output "$Command = NOT FOUND"
          }
        }
        PS1

          az vm run-command invoke \
            --resource-group "$AvdRg" \
            --name "$SessionHostName" \
            --command-id RunPowerShellScript \
            --scripts "$(cat "$ScriptFile")" \
            --query 'value[].message' \
            --output tsv

          rm -f "$ScriptFile"

          echo ''
          echo '===== Result ====='
          echo "Expected assigned user: $ExpectedAssignedUser"
          echo "Saved evidence: $EvidenceFile"
        } >> "$EvidenceFile"

        cat "$EvidenceFile"
      args:
        executable: /bin/bash
      changed_when: false
