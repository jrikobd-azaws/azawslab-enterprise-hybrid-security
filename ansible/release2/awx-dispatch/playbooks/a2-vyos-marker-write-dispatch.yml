---
- name: A2 dispatch approved VyOS marker write on management Ansible host
  hosts: a2_ansible_execution_hosts
  gather_facts: false
  vars:
    a1_ansible_repo_dir: /home/azureuser/azawslab-o3b-ansible
    a1_aws_profile: o3b-mgmt-rolesanywhere
    a1_aws_region: eu-west-1
    a2_change_approved: false
    a2_change_ticket: ""
    a2_change_reason: ""

  tasks:
    - name: Assert Tier 4 launch approval variables are present
      ansible.builtin.assert:
        that:
          - a2_change_approved | bool
          - a2_change_ticket | length > 0
          - a2_change_reason | length > 0
        fail_msg: "Tier 4 requires a2_change_approved=true, a2_change_ticket, and a2_change_reason."

    - name: Run A2 VyOS marker write wrapper from management host
      ansible.builtin.shell: |
        set -euo pipefail
        export PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
        cd "{{ a1_ansible_repo_dir }}"
        A1_AWS_PROFILE="{{ a1_aws_profile }}" \
        A1_AWS_REGION="{{ a1_aws_region }}" \
        A2_CHANGE_APPROVED="true" \
        A2_CHANGE_TICKET="{{ a2_change_ticket }}" \
        A2_CHANGE_REASON="{{ a2_change_reason }}" \
        network/scripts/run-vyos-marker-write.sh
      args:
        executable: /bin/bash
      register: a2_vyos_marker_write_dispatch
      changed_when: false

    - name: Assert A2 VyOS marker write completed successfully
      ansible.builtin.assert:
        that:
          - "'A2 VyOS marker write complete. Runtime secrets unset.' in a2_vyos_marker_write_dispatch.stdout"
        fail_msg: "A2 VyOS marker write wrapper did not report successful completion."
        success_msg: "A2 VyOS marker write completed successfully from the management host."

    - name: Show A2 VyOS marker write output
      ansible.builtin.debug:
        var: a2_vyos_marker_write_dispatch.stdout_lines