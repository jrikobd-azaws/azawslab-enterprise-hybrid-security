---
- name: O5 - Tier 2 - AVD Toolchain Egress Preflight Dispatch
  hosts: vm_dev_mgmt_01
  gather_facts: false

  vars:
    avd_resource_group: rg-dev-avd-northeurope
    avd_session_host_name: vm-dev-avd-01

  tasks:
    - name: Login to Azure with vm-dev-mgmt-01 managed identity
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 60 az login --identity --output none
        az account show --query '{user:user.name,tenantId:tenantId,subscriptionId:id,name:name,state:state}' --output json
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate O5 toolchain endpoint egress from AVD session host
      ansible.builtin.shell: |
        set -euo pipefail

        ScriptFile="$(mktemp)"
        cat > "$ScriptFile" <<'PS1'
        $ErrorActionPreference = 'Continue'

        Write-Output 'O5 AVD Toolchain Egress Preflight'
        Write-Output '================================='
        Write-Output ''
        Write-Output 'Purpose: Validate outbound DNS/TCP/HTTPS reachability required before installing O5 admin/dev tooling.'
        Write-Output 'Scope: Read-only network reachability validation only.'
        Write-Output 'No software is installed by this check.'
        Write-Output ''

        function Test-O5Endpoint {
          param(
            [Parameter(Mandatory = $true)]
            [string]$HostName
          )

          Write-Output ''
          Write-Output "===== $HostName ====="

          Write-Output 'DNS:'
          Resolve-DnsName -Name $HostName -ErrorAction Continue |
            Select-Object Name, Type, IPAddress, NameHost |
            Format-Table -AutoSize

          Write-Output ''
          Write-Output 'TCP 443:'
          $TcpResult = Test-NetConnection -ComputerName $HostName -Port 443
          $TcpResult |
            Select-Object ComputerName, RemoteAddress, RemotePort, SourceAddress, TcpTestSucceeded |
            Format-List

          Write-Output ''
          Write-Output 'HTTPS:'
          try {
            $Response = Invoke-WebRequest -Uri "https://$HostName" -UseBasicParsing -TimeoutSec 20
            Write-Output "HTTPS status: $($Response.StatusCode)"
          }
          catch {
            Write-Output 'HTTPS probe completed with exception:'
            Write-Output $_.Exception.Message
            if ($_.Exception.Response) {
              Write-Output "HTTP response status: $($_.Exception.Response.StatusCode.value__)"
            }
          }
        }

        Test-O5Endpoint -HostName 'login.microsoftonline.com'
        Test-O5Endpoint -HostName 'pas.windows.net'
        Test-O5Endpoint -HostName 'management.azure.com'
        Test-O5Endpoint -HostName 'packages.microsoft.com'
        Test-O5Endpoint -HostName 'azcliprod.blob.core.windows.net'
        Test-O5Endpoint -HostName 'github.com'
        Test-O5Endpoint -HostName 'objects.githubusercontent.com'
        Test-O5Endpoint -HostName 'github-releases.githubusercontent.com'
        Test-O5Endpoint -HostName 'update.code.visualstudio.com'
        Test-O5Endpoint -HostName 'releases.hashicorp.com'
        Test-O5Endpoint -HostName 'dl.k8s.io'
        Test-O5Endpoint -HostName 'cdn.dl.k8s.io'
        Test-O5Endpoint -HostName 'get.helm.sh'
        Test-O5Endpoint -HostName 'awscli.amazonaws.com'
        PS1

        timeout 900 az vm run-command invoke \
          --resource-group '{{ avd_resource_group }}' \
          --name '{{ avd_session_host_name }}' \
          --command-id RunPowerShellScript \
          --scripts "$(cat "$ScriptFile")" \
          --query 'value[].message' \
          --output tsv

        rm -f "$ScriptFile"
      args:
        executable: /bin/bash
      changed_when: false
