---
- name: Define AD join runtime values
  ansible.builtin.set_fact:
    ad_join_domain_name: hq.azawslab.co.uk
    ad_join_domain_controller: dc1.hq.azawslab.co.uk
    ad_join_dc_ip: 192.168.1.10
    ad_join_dns_server: 192.168.1.10
    ad_join_domain_user: hq.admin@hq.azawslab.co.uk
    ad_join_computer_ou: OU=Workstations,OU=AzawsLab,DC=hq,DC=azawslab,DC=co,DC=uk
    ad_join_target_hostname: vmdevclient01
    ad_join_password: "{{ lookup('env', 'HQ_DOMAIN_JOIN_PASSWORD') }}"

- name: Assert domain join password is available from Key Vault-backed runtime environment
  ansible.builtin.assert:
    that:
      - ad_join_password | length > 0
    fail_msg: "HQ_DOMAIN_JOIN_PASSWORD is not loaded. Run through scripts/run-with-keyvault-secrets.sh."
    success_msg: "Domain join password is loaded from Key Vault-backed runtime environment."

- name: Show AD join target summary
  ansible.builtin.debug:
    msg:
      - "Domain: {{ ad_join_domain_name }}"
      - "Domain controller: {{ ad_join_domain_controller }} / {{ ad_join_dc_ip }}"
      - "DNS server to set on Windows target: {{ ad_join_dns_server }}"
      - "Computer OU: {{ ad_join_computer_ou }}"
      - "Target hostname: {{ ad_join_target_hostname }}"

- name: Set Windows DNS client to HQ DC DNS
  ansible.windows.win_dns_client:
    adapter_names: '*'
    dns_servers:
      - "{{ ad_join_dns_server }}"

- name: Validate DNS resolution against HQ DC DNS
  ansible.windows.win_shell: |
    Resolve-DnsName -Name '{{ ad_join_domain_name }}' -Server '{{ ad_join_dns_server }}' -ErrorAction Stop
    Resolve-DnsName -Name '{{ ad_join_domain_controller }}' -Server '{{ ad_join_dns_server }}' -ErrorAction Stop
  register: ad_join_dns_validation
  changed_when: false

- name: Validate required TCP ports to DC1
  ansible.windows.win_shell: |
    $Ports = @(53,88,135,389,445,464,3268,3269)
    $Failed = @()

    foreach ($Port in $Ports) {
        $Result = Test-NetConnection -ComputerName '{{ ad_join_dc_ip }}' -Port $Port
        if (-not $Result.TcpTestSucceeded) {
            $Failed += $Port
        }
    }

    if ($Failed.Count -gt 0) {
        throw "Failed TCP port checks to {{ ad_join_dc_ip }}: $($Failed -join ', ')"
    }

    Write-Output "All required TCP checks to {{ ad_join_dc_ip }} passed."
  register: ad_join_port_validation
  changed_when: false

- name: Join Windows target to HQ domain
  microsoft.ad.membership:
    dns_domain_name: "{{ ad_join_domain_name }}"
    domain_server: "{{ ad_join_domain_controller }}"
    hostname: "{{ ad_join_target_hostname }}"
    domain_admin_user: "{{ ad_join_domain_user }}"
    domain_admin_password: "{{ ad_join_password }}"
    domain_ou_path: "{{ ad_join_computer_ou }}"
    state: domain
    reboot: true
    reboot_timeout: 900
  register: ad_join_result
  no_log: true

- name: Validate domain membership after join
  ansible.windows.win_shell: |
    $Info = Get-ComputerInfo | Select-Object CsName, CsDomain, CsPartOfDomain
    $Info | Format-List

    if ($Info.CsPartOfDomain -ne $true) {
        throw "Computer is not domain joined."
    }

    if ($Info.CsDomain -ne '{{ ad_join_domain_name }}') {
        throw "Unexpected domain: $($Info.CsDomain)"
    }

    nltest /dsgetdc:{{ ad_join_domain_name }}
  register: ad_join_post_validation
  changed_when: false

- name: Show AD join validation summary
  ansible.builtin.debug:
    msg:
      - "AD join role completed."
      - "Target is joined to {{ ad_join_domain_name }}."
      - "Computer OU target: {{ ad_join_computer_ou }}."
      - "DNS client now uses {{ ad_join_dns_server }}."
