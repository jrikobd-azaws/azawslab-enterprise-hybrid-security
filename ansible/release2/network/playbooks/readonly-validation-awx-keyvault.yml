---
- name: A2 AWX Azure Key Vault runtime secret bootstrap
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    azure_key_vault_name: kvdevazawsne01
    azure_key_vault_api_version: "7.4"
    fortigate_read_secret_name: p5-fortigate-api-token
    vyos_secret_name: o3b-vyos-ansible-password
  tasks:
    - name: Get Azure Key Vault token using AWX VM managed identity
      ansible.builtin.uri:
        url: "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https%3A%2F%2Fvault.azure.net"
        method: GET
        headers:
          Metadata: "true"
        return_content: true
      register: a2_azure_mi_token_response
      no_log: true

    - name: Read FortiGate read-only API token from Azure Key Vault
      ansible.builtin.uri:
        url: "https://{{ azure_key_vault_name }}.vault.azure.net/secrets/{{ fortigate_read_secret_name }}?api-version={{ azure_key_vault_api_version }}"
        method: GET
        headers:
          Authorization: "Bearer {{ a2_azure_mi_token_response.json.access_token }}"
        return_content: true
      register: a2_fortigate_token_response
      no_log: true

    - name: Read VyOS Ansible password from Azure Key Vault
      ansible.builtin.uri:
        url: "https://{{ azure_key_vault_name }}.vault.azure.net/secrets/{{ vyos_secret_name }}?api-version={{ azure_key_vault_api_version }}"
        method: GET
        headers:
          Authorization: "Bearer {{ a2_azure_mi_token_response.json.access_token }}"
        return_content: true
      register: a2_vyos_password_response
      no_log: true

    - name: Store Key Vault secrets as in-memory Ansible facts
      ansible.builtin.set_fact:
        a2_fortigate_api_token: "{{ a2_fortigate_token_response.json.value }}"
        a2_vyos_ansible_password: "{{ a2_vyos_password_response.json.value }}"
      no_log: true

    - name: Validate Azure Key Vault runtime secrets were loaded
      ansible.builtin.assert:
        that:
          - a2_fortigate_api_token | length > 0
          - a2_vyos_ansible_password | length > 0
        fail_msg: "A2 AWX Key Vault bootstrap failed to load one or more runtime secrets."
        success_msg: "A2 AWX Key Vault bootstrap loaded required runtime secrets."
      no_log: true

- name: A2 FortiGate read-only validation using Key Vault runtime token
  hosts: fortigate_nva
  gather_facts: false
  connection: local
  vars:
    fortigate_api_token: "{{ hostvars['localhost']['a2_fortigate_api_token'] }}"
  roles:
    - fortigate_readonly

- name: A2 VyOS read-only validation using Key Vault runtime password
  hosts: vyos_routers
  gather_facts: false
  vars:
    vyos_password: "{{ hostvars['localhost']['a2_vyos_ansible_password'] }}"
    ansible_password: "{{ hostvars['localhost']['a2_vyos_ansible_password'] }}"
  roles:
    - vyos_readonly

- name: A2 Cisco read-only validation deferred until AWS SSM runtime path is wired
  hosts: cisco_routers
  gather_facts: false
  connection: local
  tasks:
    - name: Report Cisco SSM runtime path is pending
      ansible.builtin.debug:
        msg:
          - "Cisco RESTCONF validation is intentionally deferred in Tier 1A."
          - "Next step will wire AWS IAM Roles Anywhere and SSM runtime secret retrieval."
      changed_when: false