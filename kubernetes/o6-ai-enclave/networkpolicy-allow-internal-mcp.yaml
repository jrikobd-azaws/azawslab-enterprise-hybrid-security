apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-to-internal-mcp
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector:
    matchLabels:
      azawslab.o6/agent: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-mcp-gateway
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-mcp-ingress-from-agents
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-mcp-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              azawslab.o6/agent: "true"
      ports:
        - protocol: TCP
          port: 8080
