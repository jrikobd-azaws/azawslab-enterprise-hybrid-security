apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-to-internal-mcp
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector:
    matchLabels:
      azawslab.o6/agent: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-mcp-gateway
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-mcp-ingress-from-agents
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-mcp-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              azawslab.o6/agent: "true"
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: o6-mcp-gateway-config
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
data:
  tool-policy.json: |
    {
      "allowed": [
        "read_namespace_security_posture",
        "read_networkpolicy_summary",
        "read_serviceaccount_identity_summary",
        "validate_denied_tools",
        "generate_security_finding",
        "read_resource_inventory_summary",
        "read_cost_policy",
        "estimate_runtime_cost",
        "summarise_finops_metadata",
        "generate_teardown_recommendation",
        "generate_runbook_draft",
        "generate_awx_job_template_proposal"
      ],
      "denied": [
        "terraform_apply",
        "terraform_destroy",
        "kubectl_apply",
        "run_ansible_playbook",
        "launch_awx_job",
        "modify_firewall_rule",
        "update_bgp_neighbor",
        "execute_shell",
        "read_secret_value",
        "delete_resource_group",
        "scale_nodepool",
        "resize_vm",
        "modify_networkpolicy",
        "create_clusterrolebinding"
      ]
    }
  mcp-gateway.py: |
    import json
    import time
    import urllib.parse
    from http.server import BaseHTTPRequestHandler, HTTPServer

    with open("/app/tool-policy.json", "r", encoding="utf-8") as f:
        policy = json.load(f)

    allowed = set(policy.get("allowed", []))
    denied = set(policy.get("denied", []))

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            parsed = urllib.parse.urlparse(self.path)
            params = urllib.parse.parse_qs(parsed.query)
            agent = params.get("agent", ["unknown"])[0]
            tool = parsed.path.replace("/tool/", "", 1)

            if tool in denied:
                decision = "denied"
                status = 403
                reason = "tool-denied-by-o6-policy"
            elif tool in allowed:
                decision = "allowed"
                status = 200
                reason = "tool-allowed-by-o6-policy"
            else:
                decision = "denied"
                status = 403
                reason = "tool-not-in-allow-list"

            event = {
                "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                "phase": "O6",
                "agent": agent,
                "tool": tool,
                "decision": decision,
                "reason": reason
            }
            print(json.dumps(event), flush=True)

            body = json.dumps(event).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, format, *args):
            return

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mcp-gateway
  namespace: ai-enclave
  labels:
    app.kubernetes.io/name: ai-mcp-gateway
    azawslab.phase: O6
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-mcp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-mcp-gateway
        azawslab.phase: O6
    spec:
      serviceAccountName: ai-mcp-gateway
      containers:
        - name: mcp-gateway
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/mcp-gateway.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: mcp-config
              mountPath: /app
              readOnly: true
      volumes:
        - name: mcp-config
          configMap:
            name: o6-mcp-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: ai-mcp-gateway
  namespace: ai-enclave
  labels:
    app.kubernetes.io/name: ai-mcp-gateway
    azawslab.phase: O6
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-mcp-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
