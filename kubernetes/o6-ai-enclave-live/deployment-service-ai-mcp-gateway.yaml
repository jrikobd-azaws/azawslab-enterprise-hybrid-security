apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mcp-gateway
  namespace: ai-enclave
  labels:
    app.kubernetes.io/name: ai-mcp-gateway
    azawslab.phase: O6
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-mcp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-mcp-gateway
        azawslab.phase: O6
    spec:
      serviceAccountName: ai-mcp-gateway
      containers:
        - name: mcp-gateway
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/mcp-gateway.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: mcp-config
              mountPath: /app
              readOnly: true
      volumes:
        - name: mcp-config
          configMap:
            name: o6-mcp-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: ai-mcp-gateway
  namespace: ai-enclave
  labels:
    app.kubernetes.io/name: ai-mcp-gateway
    azawslab.phase: O6
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-mcp-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
