apiVersion: batch/v1
kind: Job
metadata:
  name: ai-network-egress-deny-sim
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
    azawslab.o6/agent: "true"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        azawslab.phase: O6
        azawslab.o6/agent: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: ai-audit-agent
      containers:
        - name: network-deny-agent
          image: python:3.12-alpine
          command: ["python", "-c"]
          args:
            - |
              import urllib.request
              try:
                  urllib.request.urlopen("https://example.com", timeout=8)
                  print("UNEXPECTED_EXTERNAL_EGRESS_ALLOWED")
              except Exception as e:
                  print("EXPECTED_EXTERNAL_EGRESS_BLOCKED")
                  print(type(e).__name__)
                  print(str(e)[:200])
