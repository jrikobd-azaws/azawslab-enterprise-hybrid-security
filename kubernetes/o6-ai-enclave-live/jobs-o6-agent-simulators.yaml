apiVersion: batch/v1
kind: Job
metadata:
  name: ai-secops-agent-sim
  namespace: ai-enclave
  labels:
    azawslab.phase: O6
    azawslab.o6/agent: "true"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        azawslab.phase: O6
        azawslab.o6/agent: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: ai-secops-agent
      containers:
        - name: secops-agent
          image: python:3.12-alpine
          command: ["python", "-c"]
          args:
            - |
              import urllib.request, urllib.error
              tools=["read_networkpolicy_summary","read_secret_value","modify_networkpolicy"]
              for tool in tools:
                  url=f"http://ai-mcp-gateway.ai-enclave.svc.cluster.local:8080/tool/{tool}?agent=ai-secops-agent"
                  try:
                      print(urllib.request.urlopen(url, timeout=10).read().decode())
                  except urllib.error.HTTPError as e:
                      print(e.read().decode())
---
