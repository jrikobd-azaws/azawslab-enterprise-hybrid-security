name: Release 2 Platform Management Terraform Apply

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Deployment profile for platform-management/dev"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - a2-awx
      confirm_apply:
        description: "Set to true to apply the reviewed Terraform plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  platform-management:
    name: Terraform plan/apply (platform-management-dev)
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        shell: bash
        working-directory: terraform/platform-management/dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false
      TF_VAR_management_ssh_public_key: ${{ secrets.MGMT_SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Select profile flags
        id: profile
        run: |
          set -euo pipefail

          case "${{ github.event.inputs.profile }}" in
            current)
              echo "flags=-var=enable_a2_awx=false" >> "$GITHUB_OUTPUT"
              ;;
            a2-awx)
              echo "flags=-var=enable_a2_awx=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported profile: ${{ github.event.inputs.profile }}"
              exit 1
              ;;
          esac

      - name: Terraform plan
        run: |
          set -euo pipefail

          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            ${{ steps.profile.outputs.flags }}

      - name: Terraform apply
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Apply skipped
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: echo "Terraform apply skipped because confirm_apply was not true."
