name: Release 2 - Platform Networking Hybrid Apply

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Platform-networking deployment profile"
        required: true
        default: "current-hybrid"
        type: choice
        options:
          - current-hybrid
          - o1-service-chain
      confirm_apply:
        description: "Set to true to apply the reviewed Terraform plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  platform-networking-hybrid:
    name: Platform networking hybrid plan/apply
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        shell: bash
        working-directory: terraform/platform-networking/dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Select platform-networking profile
        id: profile
        run: |
          set -euo pipefail

          case "${{ github.event.inputs.profile }}" in
            current-hybrid)
              echo "flags=-var='enable_p5_fortigate=true' -var='enable_o3a_fortigate_vyos_ipsec=false' -var='enable_o3a_azure_vpngw_vyos=true' -var='enable_o1_fortigate_service_chain=false' -var='enable_p5_gateway_ingress_fortigate=true'" >> "$GITHUB_OUTPUT"
              ;;
            o1-service-chain)
              echo "flags=-var='enable_p5_fortigate=true' -var='enable_o3a_fortigate_vyos_ipsec=false' -var='enable_o3a_azure_vpngw_vyos=true' -var='enable_o1_fortigate_service_chain=true' -var='enable_p5_gateway_ingress_fortigate=true'" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported profile: ${{ github.event.inputs.profile }}"
              exit 1
              ;;
          esac


      - name: Import existing GatewaySubnet FortiGate ingress UDR if needed
        run: |
          set -euo pipefail

          SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          CONNECTIVITY_RG="rg-connectivity-prod-norwayeast"
          HUB_VNET="vnet-dev-norwayeast-hub"
          ROUTE_TABLE_NAME="rt-dev-gateway-ingress-fgt-norwayeast"
          ROUTE_NAME="route-snet-workload-via-fgt-port1"

          ROUTE_TABLE_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${CONNECTIVITY_RG}/providers/Microsoft.Network/routeTables/${ROUTE_TABLE_NAME}"
          ROUTE_ID="${ROUTE_TABLE_ID}/routes/${ROUTE_NAME}"
          GATEWAY_SUBNET_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${CONNECTIVITY_RG}/providers/Microsoft.Network/virtualNetworks/${HUB_VNET}/subnets/GatewaySubnet"

          RT_ADDR='module.hub_spoke_networking.azurerm_route_table.gateway_ingress_fgt[0]'
          ROUTE_ADDR='module.hub_spoke_networking.azurerm_route.gateway_ingress_workload_via_fgt_port1[0]'
          ASSOC_ADDR='module.hub_spoke_networking.azurerm_subnet_route_table_association.gateway_ingress_fgt[0]'

          echo "Checking existing Azure route table..."
          az network route-table show \
            --ids "${ROUTE_TABLE_ID}" \
            --query '{name:name,resourceGroup:resourceGroup,location:location}' \
            --output table

          echo "Checking existing Azure route..."
          az network route-table route show \
            --resource-group "${CONNECTIVITY_RG}" \
            --route-table-name "${ROUTE_TABLE_NAME}" \
            --name "${ROUTE_NAME}" \
            --query '{name:name,addressPrefix:addressPrefix,nextHopType:nextHopType,nextHopIpAddress:nextHopIpAddress}' \
            --output table

          echo "Importing route table if not already in Terraform state..."
          if terraform state show "${RT_ADDR}" >/dev/null 2>&1; then
            echo "Already in state: ${RT_ADDR}"
          else
            terraform import ${{ steps.profile.outputs.flags }} "${RT_ADDR}" "${ROUTE_TABLE_ID}"
          fi

          echo "Importing route if not already in Terraform state..."
          if terraform state show "${ROUTE_ADDR}" >/dev/null 2>&1; then
            echo "Already in state: ${ROUTE_ADDR}"
          else
            terraform import ${{ steps.profile.outputs.flags }} "${ROUTE_ADDR}" "${ROUTE_ID}"
          fi

          echo "Importing GatewaySubnet route-table association if not already in Terraform state..."
          if terraform state show "${ASSOC_ADDR}" >/dev/null 2>&1; then
            echo "Already in state: ${ASSOC_ADDR}"
          else
            terraform import ${{ steps.profile.outputs.flags }} "${ASSOC_ADDR}" "${GATEWAY_SUBNET_ID}"
          fi
      - name: Terraform plan - platform networking hybrid
        run: |
          set -euo pipefail

          terraform plan \
            -out=tfplan \
            ${{ steps.profile.outputs.flags }}

      - name: Terraform apply - platform networking hybrid
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Skip apply
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: |
          echo "Apply skipped because confirm_apply was not true."
          echo "Review the Terraform plan output, then rerun with confirm_apply=true when ready."

