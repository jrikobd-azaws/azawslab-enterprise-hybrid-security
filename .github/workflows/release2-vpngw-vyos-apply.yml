name: Release 2 - Azure VPN Gateway to VyOS Apply

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Type true to apply Azure VPN Gateway to VyOS fallback resources"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  azure-vpngw-vyos:
    name: Azure VPN Gateway to VyOS - Platform Networking
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        working-directory: terraform/platform-networking/dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan - Azure VPN Gateway to VyOS
        run: |
          terraform plan \
            -out=tfplan \
            -var='enable_p5_fortigate=true' \
            -var='enable_o3a_fortigate_vyos_ipsec=false' \
            -var='enable_o3a_azure_vpngw_vyos=true'

      - name: Terraform apply - Azure VPN Gateway to VyOS
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Skip apply
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: |
          echo "Apply skipped because confirm_apply was not true."
          echo "Review the Terraform plan output, then rerun with confirm_apply=true when ready."
