name: Release 2 - Platform Shared Apply

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Platform-shared deployment profile"
        required: true
        default: "keyvault-private-endpoint"
        type: choice
        options:
          - keyvault-private-endpoint
      confirm_apply:
        description: "Set to true to apply the reviewed Terraform plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  platform-shared:
    name: Platform shared plan/apply
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        shell: bash
        working-directory: terraform/platform-shared/dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Select platform-shared profile
        id: profile
        run: |
          set -euo pipefail

          case "${{ github.event.inputs.profile }}" in
            keyvault-private-endpoint)
              echo "flags=-var='enable_key_vault_private_endpoint=true'" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported profile: ${{ github.event.inputs.profile }}"
              exit 1
              ;;
          esac

      - name: Terraform plan - platform shared
        run: |
          set -euo pipefail

          terraform plan \
            -out=tfplan \
            ${{ steps.profile.outputs.flags }}

      - name: Terraform apply - platform shared
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Skip apply
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: |
          echo "Apply skipped because confirm_apply was not true."
          echo "Review the Terraform plan output, then rerun with confirm_apply=true when ready."
