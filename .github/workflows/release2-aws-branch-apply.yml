name: Release 2 AWS Branch Terraform Apply

on:
  workflow_dispatch:
    inputs:
      ssh_source_cidr:
        description: "Temporary SSH source CIDR for O3b validation, for example x.x.x.x/32"
        required: true
        type: string
      enable_o3b_ssm_parameters:
        description: "Create or update non-secret O3b SSM parameters"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      enable_o3b_aws_cisco:
        description: "Deploy Cisco Catalyst 8000V AWS branch appliance"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      confirm_apply:
        description: "Set to true to apply the reviewed Terraform plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  aws-branch-apply:
    name: Terraform apply (aws-branch-dev)
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        working-directory: terraform/aws-branch/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -var-file=o3b-dev.tfvars \
            -var="ssh_source_cidr=${{ github.event.inputs.ssh_source_cidr }}" \
            -var="enable_o3b_ssm_parameters=${{ github.event.inputs.enable_o3b_ssm_parameters }}" \
            -var="enable_o3b_aws_cisco=${{ github.event.inputs.enable_o3b_aws_cisco }}" \
            -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Apply skipped
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: echo "Terraform apply skipped because confirm_apply was not true."
