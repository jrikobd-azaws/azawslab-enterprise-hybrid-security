name: Release 2 AWS Branch Terraform Apply

on:
  workflow_dispatch:
    inputs:
      ssh_source_cidr:
        description: "Temporary SSH source CIDR for O3b validation, for example x.x.x.x/32"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  aws-branch-apply:
    name: Terraform apply (aws-branch-dev)
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        shell: bash
        working-directory: terraform/aws-branch/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -var-file=o3b-dev.tfvars \
            -var="ssh_source_cidr=${{ inputs.ssh_source_cidr }}" \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
