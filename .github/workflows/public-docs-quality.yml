name: Public Docs Quality

on:
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - "*.md"
      - docs/**
      - site/**
      - mkdocs.yml
      - requirements-mkdocs.txt
      - scripts/quality/**
      - .github/workflows/public-docs-quality.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - "*.md"
      - docs/**
      - site/**
      - mkdocs.yml
      - requirements-mkdocs.txt
      - scripts/quality/**
      - .github/workflows/public-docs-quality.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-docs-quality:
    name: Public docs quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run public documentation quality checks
        shell: pwsh
        run: ./scripts/quality/check-public-docs.ps1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-mkdocs.txt

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mkdocs.txt

      - name: Build MkDocs site strictly
        run: mkdocs build --strict