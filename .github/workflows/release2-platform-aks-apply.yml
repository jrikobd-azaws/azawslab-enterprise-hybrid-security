name: Release 2 - Platform AKS Apply

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Platform AKS deployment profile"
        required: true
        default: "o4-private-aks-full"
        type: choice
        options:
          - o4-private-aks-full
      confirm_apply:
        description: "Set to true to apply the reviewed Terraform plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

concurrency:
  group: release2-platform-aks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  platform-aks:
    name: Platform AKS plan/apply
    runs-on: ubuntu-latest
    environment: release-2

    defaults:
      run:
        shell: bash
        working-directory: terraform/platform-aks/dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Select platform AKS profile
        id: profile
        run: |
          set -euo pipefail

          case "${{ github.event.inputs.profile }}" in
            o4-private-aks-full)
              echo "flags=-var='enable_o4_private_aks=true' -var='enable_o5_avd_aks_dns_link=true'" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported profile: ${{ github.event.inputs.profile }}"
              exit 1
              ;;
          esac

      - name: Terraform plan - platform AKS
        run: |
          set -euo pipefail

          terraform plan \
            -no-color \
            -input=false \
            -lock-timeout=5m \
            -out=tfplan \
            ${{ steps.profile.outputs.flags }}

      - name: Terraform apply - platform AKS
        if: ${{ github.event.inputs.confirm_apply == 'true' }}
        run: terraform apply -input=false -lock-timeout=5m -auto-approve tfplan

      - name: Skip apply
        if: ${{ github.event.inputs.confirm_apply != 'true' }}
        run: |
          echo "Apply skipped because confirm_apply was not true."
          echo "Review the Terraform plan output, then rerun with confirm_apply=true when ready."