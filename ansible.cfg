[defaults]
roles_path = ./ansible/release2/network/roles:./ansible/release2/roles:./roles:/runner/requirements_roles:/runner/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
collections_path = /runner/requirements_collections:/runner/.ansible/collections:/usr/share/ansible/collections
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
bin_ansible_callbacks = True
deprecation_warnings = False

[inventory]
enable_plugins = yaml, ini, auto