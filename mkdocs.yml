site_name: Azawslab Enterprise Hybrid Security Platform
site_description: Enterprise hybrid cloud architecture, platform engineering, zero-trust operations, and governed AI operations portfolio.
site_url: https://www.azawslab.co.uk/
repo_url: https://github.com/jrikobd-azaws/azawslab-enterprise-hybrid-security
repo_name: jrikobd-azaws/azawslab-enterprise-hybrid-security
edit_uri: edit/main/site/

docs_dir: site
site_dir: .site

theme:
  favicon: assets/brand/favicon-32x32.png
  logo: assets/brand/logo-nav.svg
  name: material
  language: en
  icon:
    logo: material/shield-key-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

  - Portfolio:
      - Portfolio Case Study: portfolio-case-study.md
      - Proof Gallery: proof-gallery.md
      - Skills Matrix: skills-matrix.md
      - Architecture Overview: architecture.md

  - Reviewer Pathways:
      - Recruiter: role-paths/recruiter.md
      - Hiring Manager: role-paths/hiring-manager.md
      - Technical Reviewer: role-paths/technical-reviewer.md
      - Security Architect: role-paths/security-architect.md
      - DevOps / SRE: role-paths/devops-sre.md

  - AI and Innovation:
      - Governed AI Operations Enclave: ai-operations/index.md
      - Companion Local AI Lab: companion-project.md
