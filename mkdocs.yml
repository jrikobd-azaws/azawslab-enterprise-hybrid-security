site_name: Azawslab Enterprise Hybrid Security Platform
site_description: Enterprise hybrid cloud architecture, platform engineering, zero-trust operations, and governed AI operations portfolio.
site_url: https://www.azawslab.co.uk/
repo_url: https://github.com/jrikobd-azaws/azawslab-enterprise-hybrid-security
repo_name: jrikobd-azaws/azawslab-enterprise-hybrid-security
edit_uri: edit/main/site/

docs_dir: site
site_dir: .site

theme:
  favicon: assets/brand/favicon-32x32.png
  logo: assets/brand/logo-nav.svg
  name: material
  language: en
  icon:
    logo: material/shield-key-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md

  - Portfolio:
      - Portfolio Case Study: portfolio-case-study.md
      - Proof Gallery: proof-gallery.md
      - Skills Matrix: skills-matrix.md
      - Architecture Overview: architecture.md
  - Platform Journey:
      - Platform Journey Overview: releases/index.md
      - Release 1 - Hybrid Modern Workplace, Identity, Endpoint Security and Microsoft 365 Operations: releases/release1.md
      - Release 2 - Azure Platform Engineering, Security, Automation, Private Platform and AI Operations: releases/release2.md
      - Release 3 - Multi-Cloud Kubernetes, GitOps and DevSecOps Roadmap: releases/release3.md

  - Engineering Deep Dive:
      - Engineering Overview: engineering/index.md

      - R1 Workplace:
          - Hybrid Identity: engineering/hybrid-identity.md
          - Exchange Hybrid and M365 Services: engineering/exchange-hybrid-m365-services.md
          - Endpoint Management: engineering/modern-endpoint-management.md
          - Graph and PowerShell: engineering/graph-powershell-operations.md

          - Monitoring and Operational Visibility: engineering/release1-monitoring-operational-visibility.md
      - Release 2 Delivery Engineering:
          - Terraform State: engineering/terraform-state-boundaries.md
          - GitHub Actions OIDC: engineering/github-actions-oidc.md
          - Code Traceability: engineering/code-traceability.md

      - Release 2 Network Engineering:
          - Multi-Cloud Networking: engineering/hybrid-multicloud-networking.md
          - Secure Transmission: engineering/secure-transmission-inspection.md
          - BGP Multi-Cloud Transit: engineering/hybrid-bgp-multicloud-transit.md

      - Release 2 Platform Services:
          - Private AKS: engineering/private-aks-platform.md
          - AVD Workspace: engineering/avd-secure-workspace.md
          - AKS and AVD Architecture: engineering/private-aks-avd.md

      - Release 2 Operations Engineering:
          - Automation Control Plane: engineering/automation-control-plane.md
          - Monitoring, Backup and Resilience: engineering/monitoring-backup-resilience.md
  - Reviewer Pathways:
      - Recruiter: role-paths/recruiter.md
      - Hiring Manager: role-paths/hiring-manager.md
      - Technical Reviewer: role-paths/technical-reviewer.md
      - Security Architect: role-paths/security-architect.md
      - DevOps / SRE: role-paths/devops-sre.md

  - AI and Innovation:
      - Governed AI Operations Enclave: ai-operations/index.md
      - Companion Local AI Lab: companion-project.md

extra_javascript: []
