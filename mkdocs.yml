site_name: Azawslab Enterprise Hybrid Security Platform
site_description: Enterprise hybrid cloud architecture, platform engineering, zero-trust operations, and governed AI operations portfolio.
site_url: https://jrikobd-azaws.github.io/azawslab-enterprise-hybrid-security/
repo_url: https://github.com/jrikobd-azaws/azawslab-enterprise-hybrid-security
repo_name: jrikobd-azaws/azawslab-enterprise-hybrid-security
edit_uri: edit/main/site/

docs_dir: site
site_dir: .site

theme:
  name: material
  language: en
  icon:
    logo: material/shield-key-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - For Recruiters: role-paths/recruiter.md
  - Platform Journey: architecture.md
  - Case Study: portfolio-case-study.md
  - Skills Matrix: skills-matrix.md
  - Proof Gallery: proof-gallery.md
  - Evidence Guide: evidence-guide.md
  - Reader Pathways:
      - Hiring Manager: role-paths/hiring-manager.md
      - Technical Reviewer: role-paths/technical-reviewer.md
      - Security Architect: role-paths/security-architect.md
      - DevOps and SRE: role-paths/devops-sre.md
  - Engineering Deep Dive:
      - Terraform State Boundaries: engineering/terraform-state-boundaries.md
      - GitHub Actions OIDC: engineering/github-actions-oidc.md
      - Hybrid Multi-Cloud Networking: engineering/hybrid-multicloud-networking.md
      - Private AKS and AVD: engineering/private-aks-avd.md
  - AI Operations: ai-operations/index.md
  - Companion Project: companion-project.md
  - Interview Guide: interview-guide.md